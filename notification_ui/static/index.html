<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notification Service - Test Dashboard</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--border:#2e3348;--text:#e1e4ed;--text2:#8b8fa3;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--blue:#3b82f6;--cyan:#06b6d4}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* Layout */
.app{height:100vh;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border)}
.topbar h1{font-size:18px;font-weight:600}
.topbar .right{display:flex;align-items:center;gap:16px}
.ws-badge{font-size:12px;padding:4px 10px;border-radius:20px;font-weight:600}
.ws-badge.connected{background:rgba(34,197,94,.15);color:var(--green)}
.ws-badge.disconnected{background:rgba(239,68,68,.15);color:var(--red)}
.unread-badge{background:var(--red);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-accent:hover{background:var(--accent2)}
.btn-sm{padding:4px 10px;font-size:12px}
/* Main layout */
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;border-right:1px solid var(--border);background:var(--surface);padding:16px;overflow-y:auto;flex-shrink:0}
.sidebar h3{font-size:13px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.sidebar select,.sidebar input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);font-size:13px;margin-bottom:10px;outline:none}
.sidebar select:focus,.sidebar input:focus{border-color:var(--accent)}
.sidebar label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 16px}
.tab{padding:10px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* Banner ticker */
.banner-strip{background:linear-gradient(90deg,var(--surface2),var(--surface));border-bottom:1px solid var(--border);overflow:hidden;height:36px;display:flex;align-items:center}
.banner-scroll{display:flex;animation:scroll 30s linear infinite;white-space:nowrap;gap:60px;padding:0 20px}
.banner-scroll:hover{animation-play-state:paused}
.banner-item{font-size:13px;color:var(--orange);font-weight:500;display:flex;align-items:center;gap:8px}
.banner-item .dot{width:6px;height:6px;border-radius:50%;background:var(--orange)}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
/* Notification list */
.notif-list{flex:1;overflow-y:auto;padding:16px}
.notif-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:.15s}
.notif-card:hover{border-color:var(--accent)}
.notif-card.unread{border-left:3px solid var(--accent)}
.notif-card .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.notif-card .title{font-size:14px;font-weight:600}
.notif-card .time{font-size:11px;color:var(--text2);white-space:nowrap}
.notif-card .message{font-size:13px;color:var(--text2);line-height:1.5}
.notif-card .tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.tag{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tag.login{background:rgba(99,102,241,.15);color:var(--accent2)}
.tag.jobs{background:rgba(59,130,246,.15);color:var(--blue)}
.tag.ai{background:rgba(6,182,212,.15);color:var(--cyan)}
.tag.candidate{background:rgba(34,197,94,.15);color:var(--green)}
.tag.security{background:rgba(239,68,68,.15);color:var(--red)}
.tag.system{background:rgba(245,158,11,.15);color:var(--orange)}
.tag.user_management{background:rgba(168,85,247,.15);color:#a855f7}
.tag.critical{background:rgba(239,68,68,.2);color:var(--red)}
.tag.high{background:rgba(245,158,11,.2);color:var(--orange)}
.tag.medium{background:rgba(59,130,246,.15);color:var(--blue)}
.tag.low{background:rgba(107,114,128,.15);color:#6b7280}
/* Pagination */
.pagination{display:flex;justify-content:center;align-items:center;gap:12px;padding:12px;border-top:1px solid var(--border);background:var(--surface)}
.pagination span{font-size:13px;color:var(--text2)}
/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;color:var(--text2)}
.empty svg{width:48px;height:48px;margin-bottom:16px;opacity:.4}
/* Toast */
.toast-container{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;min-width:300px;max-width:400px;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:slideIn .3s ease}
.toast .toast-title{font-size:13px;font-weight:600;margin-bottom:4px}
.toast .toast-msg{font-size:12px;color:var(--text2)}
.toast.critical{border-left:3px solid var(--red)}
.toast.high{border-left:3px solid var(--orange)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
/* Send modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:480px;max-height:80vh;overflow-y:auto}
.modal h3{margin-bottom:16px;font-size:16px}
.modal label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block}
.modal input,.modal select,.modal textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);font-size:13px;margin-bottom:12px;outline:none;font-family:inherit}
.modal textarea{min-height:80px;resize:vertical}
.modal .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
/* Responsive */
@media(max-width:768px){.sidebar{display:none}.main{flex-direction:column}}
</style>
</head>
<body>

<!-- APP (no login screen — server logs in on startup) -->
<div class="app" id="app" style="display:flex">
  <!-- Topbar -->
  <div class="topbar">
    <h1>Notification Dashboard</h1>
    <div class="right">
      <span class="ws-badge disconnected" id="wsBadge">Disconnected</span>
      <div class="unread-badge" id="unreadBadge" title="Unread">0</div>
      <button class="btn btn-sm" onclick="markAllRead()">Mark All Read</button>
      <button class="btn btn-sm btn-accent" onclick="openSendModal()">Send Notification</button>
      <span id="sessionInfo" style="font-size:12px;color:var(--text2)">connecting...</span>
      <select id="userSelect" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);font-size:13px">
        <option value="">-- View as User --</option>
      </select>
      <button class="btn btn-sm" onclick="location.reload()">Refresh</button>
    </div>
  </div>

  <!-- Banner ticker -->
  <div class="banner-strip" id="bannerStrip" style="display:none">
    <div class="banner-scroll" id="bannerScroll"></div>
  </div>

  <!-- Main content -->
  <div class="main">
    <!-- Sidebar filters -->
    <div class="sidebar">
      <h3>Filters</h3>
      <label>Domain Type</label>
      <select id="fDomain" onchange="loadNotifications()">
        <option value="">All Types</option>
        <option value="login">Login & Auth</option>
        <option value="jobs">Jobs & Positions</option>
        <option value="ai">AI & Processing</option>
        <option value="candidate">Candidates</option>
        <option value="security">Security</option>
        <option value="system">System</option>
        <option value="user_management">User Management</option>
      </select>
      <label>Priority</label>
      <select id="fPriority" onchange="loadNotifications()">
        <option value="">All Priorities</option>
        <option value="critical">Critical</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
      <label>Read Status</label>
      <select id="fRead" onchange="loadNotifications()">
        <option value="">All</option>
        <option value="false">Unread Only</option>
        <option value="true">Read Only</option>
      </select>
      <label>Delivery Mode</label>
      <select id="fMode" onchange="loadNotifications()">
        <option value="">All</option>
        <option value="push">Push</option>
        <option value="banner">Banner</option>
      </select>
      <label>Date From</label>
      <input type="date" id="fDateFrom" onchange="loadNotifications()">
      <label>Date To</label>
      <input type="date" id="fDateTo" onchange="loadNotifications()">
      <hr style="border-color:var(--border);margin:12px 0">
      <h3>Admin Log</h3>
      <label>Source Service</label>
      <select id="fSource" onchange="loadAdminLogs()">
        <option value="">All Services</option>
        <option value="login">Login</option>
        <option value="job">Job</option>
        <option value="candidate">Candidate</option>
        <option value="resume_analyzer">Resume Analyzer</option>
        <option value="rbac">RBAC</option>
        <option value="bulk_candidate">Bulk Candidate</option>
        <option value="system">System</option>
      </select>
    </div>

    <!-- Content area -->
    <div class="content">
      <div class="tabs">
        <div class="tab active" data-tab="notifications" onclick="switchTab(this)">My Notifications</div>
        <div class="tab" data-tab="admin" onclick="switchTab(this)">Admin Logs</div>
        <div class="tab" data-tab="banners" onclick="switchTab(this)">Banners</div>
        <div class="tab" data-tab="schedules" onclick="switchTab(this)">Schedules</div>
      </div>
      <div class="notif-list" id="notifList">
        <div class="empty"><p>Loading notifications...</p></div>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div>

<!-- Send notification modal -->
<div class="modal-overlay" id="sendModal">
  <div class="modal">
    <h3>Send Notification</h3>
    <label>Title</label>
    <input type="text" id="mTitle" placeholder="Notification title">
    <label>Message</label>
    <textarea id="mMessage" placeholder="Notification message"></textarea>
    <label>Delivery Mode</label>
    <select id="mMode">
      <option value="push">Push</option>
      <option value="banner">Banner</option>
    </select>
    <label>Domain Type</label>
    <select id="mDomain">
      <option value="system">System</option>
      <option value="login">Login</option>
      <option value="jobs">Jobs</option>
      <option value="ai">AI</option>
      <option value="candidate">Candidate</option>
      <option value="security">Security</option>
      <option value="user_management">User Management</option>
    </select>
    <label>Priority</label>
    <select id="mPriority">
      <option value="medium">Medium</option>
      <option value="low">Low</option>
      <option value="high">High</option>
      <option value="critical">Critical</option>
    </select>
    <label>Target Type</label>
    <select id="mTarget" onchange="toggleTargetId()">
      <option value="all">All Users</option>
      <option value="user">Specific User(s)</option>
      <option value="role">Role</option>
      <option value="job">Job</option>
    </select>
    <label>Target ID <small>(user IDs csv, role name, or job ID)</small></label>
    <input type="text" id="mTargetId" placeholder="e.g. 1,2,3 or admin or 42" disabled>
    <label>Expires At <small>(for banners)</small></label>
    <input type="datetime-local" id="mExpires">
    <div class="actions">
      <button class="btn" onclick="closeSendModal()">Cancel</button>
      <button class="btn btn-accent" onclick="sendNotification()">Send</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toasts"></div>

<script>
const API_BASE = window.location.origin;
let WS = null;
let currentTab = 'notifications';
let currentPage = 1;

// Selected user_id — defaults to 1 (supriyohti), changes via dropdown
function getSelectedUserId() {
  const sel = document.getElementById('userSelect');
  return sel && sel.value ? parseInt(sel.value) : 1;
}

// --- API helpers (no auth — test endpoints are open) ---
function api(path, opts = {}) {
  const headers = {'Content-Type':'application/json'};
  return fetch(API_BASE + path, {...opts, headers}).then(r => r.json());
}

// --- INIT ---
function initApp() {
  document.getElementById('sessionInfo').textContent = 'supriyohti (super_admin)';
  loadUsers();
  loadNotifications();
  loadBanners();
  connectWS();
}

// --- USERS ---
function loadUsers() {
  api('/api/users').then(d => {
    const sel = document.getElementById('userSelect');
    const items = Array.isArray(d) ? d : (d.users || d || []);
    sel.innerHTML = '';
    items.forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.id;
      opt.textContent = `${u.name} (${u.role || 'user'})`;
      if (u.id === 1) opt.selected = true;
      sel.appendChild(opt);
    });
  }).catch(() => {});
}

// When user dropdown changes, reload everything for that user
document.addEventListener('DOMContentLoaded', () => {
  const sel = document.getElementById('userSelect');
  if (sel) sel.addEventListener('change', () => {
    loadNotifications();
    loadUnreadCount();
    if (WS) WS.close(); // reconnect with new user_id
    connectWS();
  });
});

// --- NOTIFICATIONS ---
function loadNotifications() {
  currentPage = 1;
  fetchNotifications();
}

function fetchNotifications() {
  let q = `?user_id=${getSelectedUserId()}&page=${currentPage}&limit=20`;
  const d = document.getElementById('fDomain').value;
  const p = document.getElementById('fPriority').value;
  const r = document.getElementById('fRead').value;
  const m = document.getElementById('fMode').value;
  const df = document.getElementById('fDateFrom').value;
  const dt = document.getElementById('fDateTo').value;
  if (d) q += `&domain_type=${d}`;
  if (p) q += `&priority=${p}`;
  if (r) q += `&is_read=${r}`;
  if (m) q += `&delivery_mode=${m}`;
  if (df) q += `&date_from=${df}`;
  if (dt) q += `&date_to=${dt}`;

  api('/api/notifications' + q).then(d => {
    renderNotifications(d.notifications || [], d.pagination, d.unread_count);
    if (d.unread_count !== undefined) updateUnread(d.unread_count);
  }).catch(() => renderEmpty());
}

function loadAdminLogs() {
  let q = `?page=${currentPage}&limit=20`;
  const s = document.getElementById('fSource').value;
  const d = document.getElementById('fDomain').value;
  const p = document.getElementById('fPriority').value;
  const df = document.getElementById('fDateFrom').value;
  const dt = document.getElementById('fDateTo').value;
  if (s) q += `&source_service=${s}`;
  if (d) q += `&domain_type=${d}`;
  if (p) q += `&priority=${p}`;
  if (df) q += `&date_from=${df}`;
  if (dt) q += `&date_to=${dt}`;

  api('/api/notifications/admin/logs' + q).then(d => {
    renderAdminLogs(d.notifications || [], d.pagination);
  }).catch(() => renderEmpty());
}

function renderNotifications(items, pg, unread) {
  const el = document.getElementById('notifList');
  if (!items.length) { renderEmpty(); return; }
  el.innerHTML = items.map(n => `
    <div class="notif-card ${n.is_read ? '' : 'unread'}" onclick="markRead(${n.id}, this)">
      <div class="header">
        <span class="title">${esc(n.title)}</span>
        <span class="time">${timeAgo(n.created_at)}</span>
      </div>
      <div class="message">${esc(n.message)}</div>
      <div class="tags">
        <span class="tag ${n.domain_type}">${n.domain_type}</span>
        <span class="tag ${n.priority}">${n.priority}</span>
        ${n.source_service ? `<span class="tag system">${n.source_service}</span>` : ''}
        ${n.visibility ? `<span class="tag low">${n.visibility}</span>` : ''}
      </div>
    </div>
  `).join('');
  renderPagination(pg);
}

function renderAdminLogs(items, pg) {
  const el = document.getElementById('notifList');
  if (!items.length) { renderEmpty(); return; }
  el.innerHTML = items.map(n => `
    <div class="notif-card">
      <div class="header">
        <span class="title">${esc(n.title)}</span>
        <span class="time">${timeAgo(n.created_at)}</span>
      </div>
      <div class="message">${esc(n.message)}</div>
      <div class="tags">
        <span class="tag ${n.domain_type}">${n.domain_type}</span>
        <span class="tag ${n.priority}">${n.priority}</span>
        <span class="tag low">${n.visibility}</span>
        ${n.source_service ? `<span class="tag system">${n.source_service}</span>` : ''}
        ${n.created_by_name ? `<span class="tag low">by: ${n.created_by_name}</span>` : ''}
        <span class="tag low">${n.recipients_count} recipients | ${n.read_count} read</span>
      </div>
    </div>
  `).join('');
  renderPagination(pg);
}

function renderEmpty() {
  document.getElementById('notifList').innerHTML = '<div class="empty"><p>No notifications found</p></div>';
  document.getElementById('pagination').innerHTML = '';
}

function renderPagination(pg) {
  if (!pg) { document.getElementById('pagination').innerHTML = ''; return; }
  document.getElementById('pagination').innerHTML = `
    <button class="btn btn-sm" ${pg.page<=1?'disabled':''} onclick="goPage(${pg.page-1})">Prev</button>
    <span>Page ${pg.page} of ${pg.total_pages} (${pg.total_elements} total)</span>
    <button class="btn btn-sm" ${pg.page>=pg.total_pages?'disabled':''} onclick="goPage(${pg.page+1})">Next</button>
  `;
}

function goPage(p) { currentPage = p; if (currentTab==='admin') loadAdminLogs(); else fetchNotifications(); }

// --- MARK READ ---
function markRead(id, el) {
  api(`/api/notifications/${id}/read?user_id=${getSelectedUserId()}`, {method:'PUT'}).then(() => {
    if (el) el.classList.remove('unread');
    loadUnreadCount();
  }).catch(() => {});
}

function markAllRead() {
  api(`/api/notifications/mark-all-read?user_id=${getSelectedUserId()}`, {method:'PUT'}).then(() => {
    document.querySelectorAll('.notif-card.unread').forEach(c => c.classList.remove('unread'));
    updateUnread(0);
  }).catch(() => {});
}

function loadUnreadCount() {
  api(`/api/notifications/unread-count?user_id=${getSelectedUserId()}`).then(d => updateUnread(d.count)).catch(() => {});
}

function updateUnread(n) {
  document.getElementById('unreadBadge').textContent = n;
}

// --- BANNERS ---
function loadBanners() {
  api('/api/notifications/banners/active').then(banners => {
    const strip = document.getElementById('bannerStrip');
    const scroll = document.getElementById('bannerScroll');
    if (!banners || !banners.length) { strip.style.display = 'none'; return; }
    strip.style.display = 'flex';
    const html = banners.map(b => `<span class="banner-item"><span class="dot"></span>${esc(b.title)}: ${esc(b.message)}</span>`).join('');
    scroll.innerHTML = html + html;
  }).catch(() => {});
}

// --- SCHEDULES ---
function loadSchedules() {
  api('/api/notifications/schedules?page=1&limit=20').then(d => {
    const items = d.schedules || [];
    const el = document.getElementById('notifList');
    if (!items.length) { renderEmpty(); return; }
    el.innerHTML = items.map(s => `
      <div class="notif-card">
        <div class="header">
          <span class="title">${esc(s.title)}</span>
          <span class="time">${s.status} | ${s.repeat_type}</span>
        </div>
        <div class="message">${esc(s.message)}</div>
        <div class="tags">
          <span class="tag ${s.domain_type}">${s.domain_type}</span>
          <span class="tag ${s.priority}">${s.priority}</span>
          <span class="tag low">Scheduled: ${new Date(s.scheduled_at).toLocaleString()}</span>
          ${s.status==='pending' ? `<button class="btn btn-sm" onclick="cancelSchedule(${s.id})" style="margin-left:auto">Cancel</button>` : ''}
        </div>
      </div>
    `).join('');
    renderPagination(d.pagination);
  }).catch(() => renderEmpty());
}

function cancelSchedule(id) {
  api(`/api/notifications/schedules/${id}/cancel`, {method:'PUT'}).then(() => loadSchedules()).catch(() => {});
}

// --- TABS ---
function switchTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTab = el.dataset.tab;
  currentPage = 1;
  if (currentTab === 'notifications') fetchNotifications();
  else if (currentTab === 'admin') loadAdminLogs();
  else if (currentTab === 'banners') { loadBanners(); renderBannersTab(); }
  else if (currentTab === 'schedules') loadSchedules();
}

function renderBannersTab() {
  api('/api/notifications/banners/active').then(banners => {
    const el = document.getElementById('notifList');
    if (!banners || !banners.length) { renderEmpty(); return; }
    el.innerHTML = banners.map(b => `
      <div class="notif-card">
        <div class="header">
          <span class="title">${esc(b.title)}</span>
          <span class="time">${b.expires_at ? 'Expires: ' + new Date(b.expires_at).toLocaleString() : 'No expiry'}</span>
        </div>
        <div class="message">${esc(b.message)}</div>
        <div class="tags">
          <span class="tag ${b.domain_type}">${b.domain_type}</span>
          <span class="tag ${b.priority}">${b.priority}</span>
        </div>
      </div>
    `).join('');
    document.getElementById('pagination').innerHTML = '';
  }).catch(() => renderEmpty());
}

// --- SEND NOTIFICATION ---
function openSendModal() { document.getElementById('sendModal').classList.add('show'); }
function closeSendModal() { document.getElementById('sendModal').classList.remove('show'); }
function toggleTargetId() { document.getElementById('mTargetId').disabled = document.getElementById('mTarget').value === 'all'; }

function sendNotification() {
  const mode = document.getElementById('mMode').value;
  const uid = getSelectedUserId();
  const endpoint = mode === 'banner' ? `/api/notifications/banner?user_id=${uid}` : `/api/notifications/send?user_id=${uid}`;
  const body = {
    title: document.getElementById('mTitle').value,
    message: document.getElementById('mMessage').value,
    delivery_mode: mode,
    domain_type: document.getElementById('mDomain').value,
    priority: document.getElementById('mPriority').value,
    target_type: document.getElementById('mTarget').value,
    target_id: document.getElementById('mTargetId').value || null,
  };
  if (mode === 'banner') {
    const exp = document.getElementById('mExpires').value;
    if (exp) body.expires_at = new Date(exp).toISOString();
  }
  api(endpoint, {method:'POST', body:JSON.stringify(body)}).then(d => {
    closeSendModal();
    showToast('Sent', `Notification sent to ${d.recipients_count} recipients`, 'medium');
    loadNotifications();
    if (mode === 'banner') loadBanners();
  }).catch(e => showToast('Error', 'Failed to send notification', 'critical'));
}

// --- WEBSOCKET ---
function connectWS() {
  if (WS) { try { WS.close(); } catch(e){} }
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const uid = getSelectedUserId();
  WS = new WebSocket(`${proto}://${location.host}/ws/notifications?user_id=${uid}`);
  WS.onopen = () => {
    document.getElementById('wsBadge').className = 'ws-badge connected';
    document.getElementById('wsBadge').textContent = 'Connected';
  };
  WS.onclose = () => {
    document.getElementById('wsBadge').className = 'ws-badge disconnected';
    document.getElementById('wsBadge').textContent = 'Disconnected';
    setTimeout(connectWS, 5000);
  };
  WS.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'notification') {
        const n = msg.data;
        showToast(n.title, n.message, n.priority);
        if (currentTab === 'notifications') fetchNotifications();
        loadUnreadCount();
      } else if (msg.type === 'banner') {
        loadBanners();
      } else if (msg.type === 'unread_count') {
        updateUnread(msg.data.count);
      } else if (msg.type === 'pong') { /* heartbeat ok */ }
    } catch(err) {}
  };
  // Heartbeat
  setInterval(() => { if (WS && WS.readyState === 1) WS.send(JSON.stringify({action:'ping'})); }, 30000);
}

// --- TOAST ---
function showToast(title, msg, priority) {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast ${priority||'medium'}`;
  t.innerHTML = `<div class="toast-title">${esc(title)}</div><div class="toast-msg">${esc(msg)}</div>`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 6000);
}

// --- UTILS ---
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function timeAgo(dt) {
  if (!dt) return '';
  const d = new Date(dt);
  const s = Math.floor((Date.now() - d.getTime())/1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

// --- INIT ---
window.onload = () => {
  initApp();
};
</script>
