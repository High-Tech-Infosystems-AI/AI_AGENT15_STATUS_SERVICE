version: 1
disable_existing_loggers: False

formatters:
    standard:
        format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s - [in %(pathname)s:%(lineno)d %(funcName)s]"

handlers:
    console:
        class: logging.StreamHandler
        formatter: standard
        level: DEBUG
    
    file:
        class: logging.FileHandler
        formatter: standard
        level: DEBUG
        filename: status_service.log
        encoding: utf8

loggers:
    app_logger:
        handlers: [console, file]
        level: INFO
        propagate: False
    # Silence noisy HTTP client debug logs on hot paths
    urllib3:
        level: WARNING
        propagate: False
    httpx:
        level: WARNING
        propagate: False
    httpcore:
        level: WARNING
        propagate: False

root:
    handlers: [console]
    level: INFO
