apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-service
  labels:
    app: status-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: status-service
  template:
    metadata:
      labels:
        app: status-service
    spec:
      imagePullSecrets:
        - name: harbor-creds
      containers:
        - name: status-service
          image: __DOCKER_IMAGE__
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8515
            - name: chat
              containerPort: 8517
            - name: ui
              containerPort: 5009
          envFrom:
            - configMapRef:
                name: __CONFIG_MAP_NAME__
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # Notification UI connects to Status Service on localhost (same pod)
            - name: NOTIFICATION_SERVICE_URL
              value: "http://127.0.0.1:8515"
            - name: UI_PORT
              value: "5009"
            - name: STATUS_SERVICE_PORT
              value: "8515"
            - name: CHAT_SERVICE_PORT
              value: "8517"
            - name: CHAT_SERVICE_NAME
              value: "HRMIS_CHAT_SERVICE"
            - name: CHAT_SERVICE_PATH
              value: "/chat"
            - name: CHAT_SERVICE_AUTH
              value: "mixed"
          livenessProbe:
            httpGet:
              path: /health
              port: 8515
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8515
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 10
          volumeMounts:
            - name: hrmis-logs
              mountPath: /var/log/hrmis

      volumes:
        - name: hrmis-logs
          persistentVolumeClaim:
            claimName: __LOGS_PVC__
---
# ClusterIP for the main Status/Notification API (internal traffic)
apiVersion: v1
kind: Service
metadata:
  name: status-service
  labels:
    app: status-service
spec:
  selector:
    app: status-service
  ports:
    - name: http
      port: 8515
      targetPort: 8515
  type: ClusterIP
---
# ClusterIP for the Chat API (internal traffic; gateway hits this via Consul)
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  labels:
    app: status-service
    component: chat
spec:
  selector:
    app: status-service
  ports:
    - name: chat
      port: 8517
      targetPort: 8517
  type: ClusterIP
---
# NodePort for the Notification UI (exposed to internet on port 30509)
apiVersion: v1
kind: Service
metadata:
  name: notification-ui
  labels:
    app: status-service
    component: notification-ui
spec:
  type: NodePort
  selector:
    app: status-service
  ports:
    - name: ui
      port: 5009
      targetPort: 5009
      nodePort: 30509
      protocol: TCP
